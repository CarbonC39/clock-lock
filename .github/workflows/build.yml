name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux x86_64 (native) ---
          - platform: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu
            rust_targets: ''

          # --- Linux ARM64 (cross-compile) ---
          - platform: ubuntu-latest
            args: --target aarch64-unknown-linux-gnu
            rust_targets: aarch64-unknown-linux-gnu
            cross_arch: arm64

          # --- macOS (both arches on macos-latest) ---
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin

          # --- Windows x86_64 (native) ---
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust_targets }}

      # --- Linux native system deps ---
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && matrix.cross_arch != 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      # --- Linux ARM64 cross-compile setup ---
      - name: Install cross-compilation toolchain (Linux ARM64)
        if: matrix.cross_arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            patchelf

          # Enable arm64 foreign architecture
          sudo dpkg --add-architecture arm64
          sudo apt-get update

          # Install arm64 Tauri system libraries
          # If any package conflicts, the build will still attempt linking
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64 \
            libsoup-3.0-dev:arm64 \
            libssl-dev:arm64 \
            librsvg2-dev:arm64 \
            || echo "::warning::Some arm64 -dev packages could not be installed. The link step may fail."

          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }}
